{% extends 'base_auth.html' %}

{% block title %}Login - Perpustakaan UKSW{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full">
        <!-- Logo & Header -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 bg-uksw-blue-100 rounded-full mb-4">
                <i class="fas fa-book-reader text-4xl text-uksw-blue-600"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900">Perpustakaan UKSW</h1>
            <p class="mt-2 text-sm text-gray-600">Silakan masuk dengan Nomor Induk Anda</p>
        </div>
        
        <!-- Login Form -->
        <div class="bg-white rounded-lg shadow-lg p-8">
            <form method="POST" action="{{ url_for('auth.login') }}" class="space-y-6">
                <div>
                    <label for="nomor_induk" class="block text-sm font-medium text-gray-700 mb-2">
                        Nomor Induk (NIM/NIP)
                    </label>
                    <input type="text" 
                           id="nomor_induk" 
                           name="nomor_induk" 
                           required
                           placeholder="Masukkan Nomor Induk Anda"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-uksw-blue-500 focus:border-transparent transition-all"
                           autocomplete="username">
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-2">
                        Kata Sandi
                    </label>
                    <input type="password" 
                           id="password" 
                           name="password" 
                           required
                           placeholder="Masukkan kata sandi"
                           class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-uksw-blue-500 focus:border-transparent transition-all"
                           autocomplete="current-password">
                </div>
                
                <button type="submit" 
                        class="w-full bg-uksw-blue-600 hover:bg-uksw-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors flex items-center justify-center">
                    <i class="fas fa-sign-in-alt mr-2"></i>
                    Masuk
                </button>
            </form>
            
            <!-- Info Box -->
            <div class="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                <p class="text-xs text-blue-800">
                    <i class="fas fa-info-circle mr-2"></i>
                    <strong>Belum punya akun?</strong> Hubungi administrator perpustakaan untuk membuat akun baru.
                </p>
            </div>
        </div>
        
        <!-- Footer Links -->
        <div class="mt-6 text-center text-sm text-gray-600">
            <p>&copy; 2024 Perpustakaan UKSW Salatiga</p>
        </div>
    </div>
</div>
{% endblock %}
