{% extends "base.html" %}

{% block title %}Bantuan Sandi - Perpustakaan UKSW{% endblock %}

{% block content %}
<div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-800 mb-2">Bantuan Sandi</h1>
    <p class="text-gray-500">Reset password anggota yang lupa</p>
</div>

<div class="max-w-2xl">
    <div class="bg-white rounded-xl shadow-md p-6">
        <form method="POST" class="space-y-4">
            <div>
                <label for="nim_nip" class="block text-sm font-medium text-gray-700 mb-2">NIM/NIP Anggota</label>
                <input type="text" name="nim_nip" required 
                       placeholder="Masukkan NIM atau NIP anggota"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>
            
            <div>
                <label for="new_password" class="block text-sm font-medium text-gray-700 mb-2">Password Baru</label>
                <input type="password" name="new_password" required minlength="6"
                       placeholder="Minimal 6 karakter"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary-500">
            </div>
            
            <button type="submit" class="w-full bg-primary-600 text-white py-2 px-4 rounded-lg font-medium hover:bg-primary-700 transition">
                Reset Password
            </button>
        </form>
    </div>
    
    {% if user_to_reset %}
    <div class="mt-6 bg-green-50 border border-green-200 rounded-lg p-4">
        <p class="text-green-800"><strong>✓</strong> Password untuk <strong>{{ user_to_reset.nama }}</strong> berhasil direset.</p>
    </div>
    {% endif %}
</div>
{% endblock %}
