steps:
- name: 'gcr.io/cloud-builders/docker'
  args: ['build', '-t', 'gcr.io/$PROJECT_ID/pos-system:$COMMIT_SHA', '.']
- name: 'gcr.io/cloud-builders/docker'
  args: ['push', 'gcr.io/$PROJECT_ID/pos-system:$COMMIT_SHA']
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  entrypoint: gcloud
  args:
  - run
  - services
  - update
  - pos-system
  - --platform=managed
  - --image=gcr.io/$PROJECT_ID/pos-system:$COMMIT_SHA
  - --region=asia-southeast2
  - --allow-unauthenticated
  - --port=5000

images:
- 'gcr.io/$PROJECT_ID/pos-system:$COMMIT_SHA'