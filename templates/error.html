<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Error {{ error_code }} - POS System</title>
  <!-- 
    Halaman error standar untuk sistem POS.
    Menangani error seperti 403 (Forbidden) dan 404 (Not Found).
    Menampilkan kode error, pesan deskriptif, dan opsi navigasi kembali.
  -->
  <!-- Font Awesome untuk ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* 
      Latar belakang halaman dengan gradien lembut untuk tampilan profesional.
      Tengahkan kartu error di tengah layar menggunakan flexbox.
    */
    body {
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f8f9fa, #e9ecef);
      font-family: 'Segoe UI', system-ui, sans-serif;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* 
      Kartu error utama: berwarna putih, bayangan halus, padding cukup, 
      dan lebar maksimum agar tetap terbaca baik di layar besar maupun kecil.
    */
    .error-card {
      background: white;
      border-radius: 1rem; /* 16px ≈ 1rem */
      box-shadow: 0 0.375rem 1.25rem rgba(0, 0, 0, 0.1); /* Bayangan lembut */
      padding: 2.5rem 1.875rem; /* 40px x 30px dalam satuan rem */
      text-align: center;
      max-width: 31.25rem; /* 500px ≈ 31.25rem */
      width: 90%;
      margin: 0 auto;
    }

    /* 
      Gaya untuk kode error (misal: 403, 404).
      Ukuran besar, warna merah untuk menarik perhatian, tanpa margin bawah berlebihan.
    */
    .error-code {
      font-size: 2.5rem; /* 40px */
      font-weight: 800;
      color: #e74c3c; /* Merah oranye */
      margin: 0 0 1.25rem; /* Jarak ke pesan di bawah */
    }

    /* 
      Pesan error deskriptif (misal: "Akses ditolak" atau "Halaman tidak ditemukan").
      Ukuran sedang, warna abu-abu gelap, spasi baris nyaman dibaca.
    */
    .error-message {
      font-size: 1.25rem; /* 20px */
      color: #6c757d;
      margin-bottom: 1.875rem; /* 30px */
      line-height: 1.5;
    }

    /* 
      Wadah untuk tombol tindakan.
      Diatur vertikal dengan jarak konsisten, lebar maksimum agar tidak terlalu lebar.
    */
    .button-group {
      display: flex;
      flex-direction: column;
      gap: 0.75rem; /* 12px antar tombol */
      max-width: 18.75rem; /* 300px */
      margin: 0 auto;
    }

    /* 
      Gaya dasar tombol: padding, radius, font tebal, efek hover, 
      dan tata letak flex untuk ikon + teks.
    */
    .btn {
      padding: 0.625rem 1.25rem; /* 10px atas/bawah, 20px kiri/kanan */
      border-radius: 0.5rem; /* 8px */
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem; /* Jarak antara ikon dan teks */
      font-size: 1rem;
      text-decoration: none;
      transition: background-color 0.2s ease;
    }

    /* 
      Tombol utama (kembali ke dashboard): biru tua, teks putih, tanpa border.
    */
    .btn-primary {
      border: none;
      background: #0288d1;
      color: white;
    }

    .btn-primary:hover {
      background: #027abc; /* Sedikit lebih gelap saat hover */
    }

    /* 
      Tombol sekunder (logout): latar putih, border abu-abu, teks gelap.
    */
    .btn-secondary {
      border: 1px solid #ced4da;
      background: white;
      color: #495057;
    }

    .btn-secondary:hover {
      background: #f8f9fa; /* Latar abu-abu sangat muda saat hover */
    }
  </style>
</head>
<body>
  <!-- 
    KONTEN ERROR UTAMA
    Menggunakan variabel dari Flask: 
      - {{ error_code }}: kode HTTP (403, 404, dll)
      - {{ message }}: pesan kustom dari backend
  -->
  <div class="error-card">
    <h1 class="error-code">{{ error_code }}</h1>
    <p class="error-message">{{ message }}</p>
    <div class="button-group">
      <!-- 
        Tombol utama: kembali ke dashboard (hanya jika pengguna masih login).
        Akan mengarahkan ke /dashboard.
      -->
      <a href="{{ url_for('dashboard') }}" class="btn btn-primary">
        <i class="fas fa-home"></i> Kembali ke Dashboard
      </a>
      <!-- 
        Tombol sekunder: logout dan kembali ke halaman login.
        Berguna jika error terjadi karena sesi tidak valid.
      -->
      <a href="{{ url_for('logout') }}" class="btn btn-secondary">
        <i class="fas fa-sign-out-alt"></i> Logout
      </a>
    </div>
  </div>
</body>
</html>
