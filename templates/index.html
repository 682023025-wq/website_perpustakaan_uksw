<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - POS System</title>
  <!-- 
    Halaman login utama untuk sistem POS.
    Dirancang dengan tata letak dua kolom: branding (kiri) dan form login (kanan).
    Mendukung validasi password, toggle visibilitas, dan tampilan jam real-time.
  -->
  <!-- Bootstrap 5.3.0 untuk komponen layout dan form responsif -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  <!-- Font Awesome untuk ikon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    /* 
      Reset dasar dan optimasi tampilan font untuk kejelasan visual.
    */
    * {
      box-sizing: border-box;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 
      Latar belakang halaman dengan gradien biru muda yang menenangkan.
      Memastikan halaman memenuhi tinggi penuh layar.
    */
    body {
      background: linear-gradient(135deg, #e6f0ff, #d0e4ff);
      min-height: 100vh;
      margin: 0;
      padding: 0;
      color: #2c3e50;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow-x: hidden;
    }

    /* 
      Kotak jam digital di pojok kanan atas.
      Menampilkan waktu dan tanggal dalam format lokal Indonesia (WIB).
      Tetap terlihat di atas konten lain (z-index tinggi).
    */
    .digital-clock-box {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: white;
      border-radius: 0.75rem;
      padding: 0.5rem 1rem;
      box-shadow: 0 0.25rem 0.625rem rgba(0, 0, 0, 0.08);
      z-index: 10;
      text-align: center;
    }

    .clock-time {
      font-size: 1.15rem;
      font-weight: 700;
      color: #0d47a1; /* Biru tua */
      margin: 0;
      line-height: 1.2;
    }

    .clock-date {
      font-size: 0.8rem;
      color: #555;
      margin: 0;
      font-weight: 500;
      margin-top: 0.125rem;
    }

    /* 
      Wadah utama untuk form login.
      Menempatkan kontainer di tengah layar secara vertikal dan horizontal,
      dengan offset atas untuk menghindari tabrakan dengan jam.
    */
    .login-wrapper {
      display: grid;
      place-items: center;
      min-height: 100vh;
      padding-top: 4rem; /* Jarak dari jam di atas */
      padding-bottom: 2rem;
      margin: 0;
    }

    /* 
      Kontainer utama login dengan layout dua kolom menggunakan CSS Grid.
      Desain modern dengan bayangan dan border-radius.
    */
    .login-container {
      max-width: 580px;
      width: 95%;
      display: grid;
      grid-template-columns: 45% 55%;
      border-radius: 1.25rem;
      overflow: hidden;
      box-shadow: 0 0.75rem 1.875rem rgba(0, 0, 0, 0.12);
      background: white;
    }

    /* 
      Kolom kiri: branding dan fitur sistem.
      Latar gradien biru, teks putih, menekankan nilai sistem POS.
    */
    .login-branding {
      background: linear-gradient(135deg, #0277bd, #0288d1, #29b6f6);
      color: white;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .login-branding h2 {
      font-weight: 800;
      font-size: 1.4rem;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .login-branding p {
      font-size: 0.85rem;
      opacity: 0.95;
      margin-bottom: 1rem;
      line-height: 1.5;
    }

    /* Daftar fitur utama sistem */
    .feature-list {
      list-style: none;
      padding-left: 0;
      margin-top: 0.625rem;
    }

    .feature-list li {
      margin-bottom: 0.5rem;
      display: flex;
      align-items: flex-start;
      gap: 0.375rem;
      font-size: 0.85rem;
    }

    .feature-list i {
      color: white;
      font-size: 0.8rem;
      margin-top: 0.25rem;
    }

    /* 
      Kolom kanan: form input login.
      Latar putih, fokus pada kejelasan dan kemudahan penggunaan.
    */
    .login-form {
      padding: 1.875rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    /* Header form dengan ikon dan judul */
    .form-header {
      text-align: center;
      margin-bottom: 1.25rem;
    }

    .form-header i {
      font-size: 2.1rem;
      color: #0288d1;
      margin-bottom: 0.625rem;
    }

    .form-header h4 {
      font-weight: 700;
      color: #0d47a1;
      margin: 0;
      font-size: 1.35rem;
    }

    /* Label form: tebal, biru tua */
    .form-label {
      font-weight: 600;
      color: #0d47a1;
      font-size: 0.9rem;
      margin-bottom: 0.375rem;
    }

    /* Input form: latar biru sangat muda, border halus */
    .form-control {
      padding: 0.625rem 0.875rem;
      border-radius: 0.625rem;
      border: 1px solid #d0e3ff;
      background: #f8fbff;
      color: #222;
      transition: all 0.3s ease;
      font-size: 0.95rem;
    }

    .form-control:focus {
      border-color: #29b6f6;
      box-shadow: 0 0 0 0.25rem rgba(41, 182, 246, 0.2);
      background: #ffffff;
    }

    /* 
      Tombol login: gradien biru, efek hover halus, bayangan dinamis.
      Dirancang agar menonjol dan mudah diklik.
    */
    .btn-login {
      background: linear-gradient(to right, #0288d1, #0277bd);
      color: white;
      border: none;
      padding: 0.6875rem;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 0.625rem;
      transition: all 0.3s ease;
      box-shadow: 0 0.25rem 0.75rem rgba(2, 120, 189, 0.25);
      font-size: 1.05rem;
      margin-top: 0.625rem;
    }

    .btn-login:hover {
      background: linear-gradient(to right, #0277bd, #0166a0);
      transform: translateY(-0.125rem);
      box-shadow: 0 0.375rem 1rem rgba(2, 120, 189, 0.35);
    }

    /* 
      Wadah untuk input password + tombol toggle visibilitas.
      Memungkinkan pengguna melihat/menyembunyikan password.
    */
    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 0.875rem;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
      color: #777;
      font-size: 0.95rem;
    }

    .password-toggle:hover {
      color: #0288d1;
    }

    /* 
      Pesan error (jika ada) dengan animasi muncul halus.
      Menggunakan komponen alert Bootstrap dengan border-radius kustom.
    */
    .alert {
      animation: fadeIn 0.4s ease-out;
      border-radius: 0.625rem;
      margin-bottom: 0.9375rem;
      font-size: 0.9rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-0.625rem);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 
      RESPONSIF: MOBILE (lebar <= 768px)
      Mengubah layout menjadi satu kolom (atas-bawah) agar muat di layar kecil.
    */
    @media (max-width: 48rem) {
      .login-container {
        grid-template-columns: 1fr;
        grid-template-rows: auto auto;
        border-radius: 1.25rem;
      }
      .login-branding {
        padding: 1.25rem;
      }
      .login-form {
        padding: 1.25rem;
      }
      .login-wrapper {
        padding-top: 3rem;
        padding-bottom: 1.5rem;
      }
    }
  </style>
</head>

<body>
  <!-- 
    JAM DAN TANGGAL REAL-TIME
    Diperbarui setiap detik menggunakan JavaScript.
    Menampilkan waktu dalam format 24 jam dan tanggal lengkap dalam bahasa Indonesia.
  -->
  <div class="digital-clock-box">
    <div class="clock-time" id="digitalClock">--:--:--</div>
    <div class="clock-date" id="dateDisplay">Senin, 01 Januari 2025</div>
  </div>

  <!-- 
    WADAH UTAMA LOGIN
    Terdiri dari dua bagian:
      1. Branding (kiri/atas): nama sistem dan fitur utama.
      2. Form login (kanan/bawah): input username, password, dan tombol.
  -->
  <div class="login-wrapper">
    <div class="login-container">
      <!-- Kolom Branding -->
      <div class="login-branding">
        <h2>POS System</h2>
        <p>Sistem terpadu untuk retail modern: cepat, akurat, dan andal.</p>
        <ul class="feature-list">
          <li><i class="fas fa-check-circle"></i> Dashboard Real-Time</li>
          <li><i class="fas fa-check-circle"></i> Master Produk & Stok</li>
          <li><i class="fas fa-check-circle"></i> Manajemen Karyawan</li>
          <li><i class="fas fa-check-circle"></i> Shift & Laporan Harian</li>
        </ul>
      </div>

      <!-- Kolom Form Login -->
      <div class="login-form">
        <div class="form-header">
          <i class="fas fa-cash-register"></i>
          <h4>Masuk ke Sistem</h4>
        </div>

        <!-- 
          PESAN ERROR (jika gagal login)
          Ditampilkan hanya jika variabel `error` dikirim dari Flask.
          Bisa ditutup oleh pengguna.
        -->
        {% if error %}
        <div class="alert alert-danger alert-dismissible fade show" role="alert">
          <i class="fas fa-exclamation-circle me-2"></i>{{ error }}
          <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endif %}

        <!-- 
          FORM LOGIN UTAMA
          Mengirim data via POST ke rute '/'.
          - Username: nama karyawan (bukan email).
          - Password: wajib 6–10 karakter.
        -->
        <form method="POST">
          <div class="mb-3">
            <label for="username" class="form-label">Username (Nama Karyawan)</label>
            <input type="text" class="form-control" id="username" name="username" required autofocus />
          </div>

          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <div class="password-wrapper">
              <input type="password" class="form-control" id="password" name="password" required minlength="6"
                maxlength="10" />
              <i class="fas fa-eye password-toggle" id="togglePassword"></i>
            </div>
            <div class="form-text text-muted">Password harus 6–10 karakter</div>
          </div>

          <button type="submit" class="btn btn-login w-100">
            <i class="fas fa-sign-in-alt me-2"></i>Login
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- 
    JAVASCRIPT: FUNGSIONALITAS UTAMA
    - Update jam & tanggal real-time.
    - Toggle visibilitas password.
    - Validasi panjang password secara real-time.
    - Autofocus ke field username.
  -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Perbarui jam dan tanggal setiap detik
    function updateClock() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('id-ID', { 
        hour12: false, 
        hour: '2-digit', 
        minute: '2-digit', 
        second: '2-digit' 
      });

      const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
      const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
      const dateString = `${dayNames[now.getDay()]}, ${now.getDate()} ${monthNames[now.getMonth()]} ${now.getFullYear()}`;

      document.getElementById('digitalClock').textContent = timeString;
      document.getElementById('dateDisplay').textContent = dateString;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // Fokus otomatis ke field username saat halaman dimuat
    document.getElementById('username').focus();

    // Toggle visibilitas password saat ikon diklik
    document.getElementById('togglePassword').addEventListener('click', function () {
      const input = document.getElementById('password');
      if (input.type === 'password') {
        input.type = 'text';
        this.classList.add('fa-eye-slash');
        this.classList.remove('fa-eye');
      } else {
        input.type = 'password';
        this.classList.add('fa-eye');
        this.classList.remove('fa-eye-slash');
      }
    });

    // Validasi panjang password secara real-time
    const password = document.getElementById('password');
    const feedback = password.nextElementSibling.nextElementSibling;
    password.addEventListener('input', () => {
      if (password.value.length < 6 || password.value.length > 10) {
        password.classList.add('is-invalid');
        feedback.textContent = 'Password harus 6–10 karakter';
        feedback.className = 'invalid-feedback d-block';
      } else {
        password.classList.remove('is-invalid');
        feedback.textContent = 'Password valid';
        feedback.className = 'form-text text-muted';
      }
    });
  </script>
</body>

</html>
